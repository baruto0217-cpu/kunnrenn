<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>救急シミュレーター v19.2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#e03535;--red2:#c42d2d;--blue:#2563eb;--orange:#ea580c;--green:#16a34a;
  --bg:#080a0f;--bg2:#13151c;--bg3:#1c1f2a;
  --s0:#ffffff;--s1:#f8f7f3;--s2:#f0efe9;--s3:#e8e6df;
  --t0:#111111;--t1:#44443f;--t2:#777770;--t3:#aaa9a0;
  --b0:rgba(0,0,0,0.06);--b1:rgba(0,0,0,0.11);--b2:rgba(0,0,0,0.18);
  --r:20px;--rs:12px;
}
body{font-family:-apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif;background:var(--s2);color:var(--t0);min-height:100vh;overscroll-behavior:none}
button{cursor:pointer;border:none;outline:none;font-family:inherit;transition:transform .15s,opacity .15s}
button:active{transform:scale(.96)}
input,textarea{font-family:inherit;outline:none;border:none;background:none}
.hscreen{height:100dvh;overflow:hidden;display:flex;flex-direction:column}
.flex{display:flex}.col{flex-direction:column}.ac{align-items:center}.jc{justify-content:center}.jsb{justify-content:space-between}
.f1{flex:1;min-width:0;min-height:0}.wf{width:100%}.hf{height:100%}.rel{position:relative}.abs{position:absolute}
.oh{overflow:hidden}.oy{overflow-y:auto}.g2{gap:8px}.g3{gap:12px}.g4{gap:16px}.g6{gap:24px}
.card{background:var(--s0);border-radius:var(--r);border:1.5px solid var(--b0);padding:28px}
.ifield{background:var(--s1);border:2px solid transparent;border-radius:var(--rs);padding:13px 15px;font-size:14px;color:var(--t0);transition:border-color .2s;display:block}
.ifield:focus{border-color:var(--red)}.ifield::placeholder{color:var(--t3)}
.btn{border-radius:var(--rs);font-weight:800;font-size:13px;padding:11px 18px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-red{background:var(--red);color:#fff;box-shadow:0 3px 12px rgba(224,53,53,.25)}
.btn-red:hover{background:var(--red2)}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 3px 12px rgba(37,99,235,.2)}
.btn-ghost{background:var(--s2);color:var(--t1)}
.btn-ghost:hover{background:var(--s3)}
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.04em}
.tag-fr{background:#dbeafe;color:#1d4ed8}.tag-bk{background:#f3e8ff;color:#7c3aed}
/* Loading */
#G-loading{background:var(--bg);color:#fff;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Config */
#G-config{background:var(--bg);color:#fff;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:0}
.cfg-box{background:var(--bg2);border-radius:24px;padding:32px;width:100%;max-width:460px;display:flex;flex-direction:column;gap:14px}
.cfg-input{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px;font-size:14px;color:#fff;font-family:inherit;outline:none;transition:border-color .2s}
.cfg-input:focus{border-color:var(--red)}.cfg-input::placeholder{color:rgba(255,255,255,.3)}
/* Role */
#G-role{background:var(--bg);color:#fff;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:520px;margin-top:40px}
.role-btn{padding:36px 20px;border-radius:28px;font-size:18px;font-weight:900;display:flex;flex-direction:column;align-items:center;gap:14px;transition:transform .2s,box-shadow .2s}
.role-btn:hover{transform:scale(1.04)}
.role-instr{background:#fff;color:#111;box-shadow:0 8px 32px rgba(255,255,255,.07)}
.role-part{background:var(--bg2);color:#fff;border:1px solid rgba(255,255,255,.07)}
/* Sync */
#G-sync{background:#04050a;color:#fff;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
.sync-ring{width:72px;height:72px;border-radius:50%;background:rgba(224,53,53,.12);display:flex;align-items:center;justify-content:center;font-size:36px;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
/* Case list */
#G-cases{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.cases-hdr{background:var(--s0);border-bottom:1px solid var(--b0);padding:16px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cases-body{flex:1;overflow-y:auto;padding:20px}
.cases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;max-width:980px;margin:0 auto}
.case-card{background:var(--s0);border-radius:22px;padding:24px;border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color .18s,box-shadow .18s}
.case-card:hover{border-color:var(--red);box-shadow:0 4px 18px rgba(224,53,53,.1)}
.add-card{border:3px dashed var(--b1);background:transparent;border-radius:22px;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--t3);cursor:pointer;transition:all .2s}
.add-card:hover{border-color:var(--red);color:var(--red)}
/* Instructor */
#G-inst{height:100dvh;height:-webkit-fill-available;display:flex;flex-direction:column;overflow:hidden}
.inst-nav{background:var(--s0);border-bottom:1px solid var(--b0);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.inst-body{flex:1;display:flex;overflow:hidden}
.inst-side{background:var(--s0);border-right:1px solid var(--b0);display:flex;flex-direction:column;gap:6px;padding:10px;width:82px;flex-shrink:0}
.tab-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 6px;border-radius:16px;border:none;background:transparent;color:var(--t3);font-size:9px;font-weight:800;gap:5px;cursor:pointer;transition:all .18s}
.tab-btn.on{background:var(--red);color:#fff;box-shadow:0 4px 12px rgba(224,53,53,.3);transform:scale(1.05)}
.tab-btn:not(.on):hover{background:var(--s2);color:var(--t0)}
.tab-icon{font-size:18px}
.inst-main{flex:1;overflow-y:auto;padding:28px;background:var(--s2)}
/* Vitals + rhythm */
.rhy-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.rhy-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.rhy-btn{padding:11px 8px;border-radius:11px;font-size:11px;font-weight:800;background:var(--s2);color:var(--t2);border:2px solid transparent;cursor:pointer;transition:all .15s;text-align:center}
.rhy-btn.on{background:#fef2f2;border-color:var(--red);color:var(--red)}
.spd-btn{flex:1;padding:9px 6px;border-radius:10px;font-size:11px;font-weight:800;background:var(--s2);color:var(--t2);border:2px solid transparent;cursor:pointer;transition:all .15s}
.spd-btn.on{background:#eff6ff;border-color:var(--blue);color:var(--blue)}
/* ECG / Participant */
#G-part{height:100dvh;height:-webkit-fill-available;background:var(--bg);color:#fff;display:flex;flex-direction:column;overflow:hidden;padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.vp{background:#000;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px 18px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.vl{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;opacity:.45;margin-bottom:3px}
.vv{font-size:clamp(28px,5vw,58px);font-weight:900;line-height:1}
.ecg-wrap{position:relative;width:100%;height:100%;background:#000;border-radius:24px;overflow:hidden}
.ecg-grid-bg{position:absolute;inset:0;opacity:.07;background-image:linear-gradient(#444 1px,transparent 1px),linear-gradient(90deg,#444 1px,transparent 1px);background-size:20px 20px;pointer-events:none}
#ecg-canvas{width:100%;height:100%;display:block;position:relative;z-index:1}
.ecg-label{position:absolute;top:16px;left:20px;z-index:2;pointer-events:none}
.ecg-rr{position:absolute;bottom:16px;right:20px;z-index:2;pointer-events:none;text-align:right}
/* Finding overlay */
.fo-wrap{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.45);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;padding:24px}
.fo-grid{display:flex;flex-direction:column;gap:14px;width:100%;max-width:820px}
.fo-card{background:rgba(8,12,24,.94);border:2px solid var(--blue);border-radius:26px;padding:28px;text-align:center;overflow:hidden}
.fo-speech{background:rgba(30,58,180,.85);border:2px solid rgba(255,255,255,.15);border-radius:26px;padding:32px;text-align:center}
@keyframes scIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
/* Metro indicator */
.metro-pill{position:fixed;bottom:20px;right:20px;background:rgba(224,53,53,.18);border:1px solid rgba(224,53,53,.35);backdrop-filter:blur(8px);border-radius:18px;padding:12px 18px;display:flex;align-items:center;gap:10px;color:#fff;animation:scIn .4s ease-out}
.metro-dot{width:8px;height:8px;border-radius:50%;background:var(--red)}
/* Modal */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.65);backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:var(--s0);border-radius:26px;padding:32px;width:100%;max-width:440px;animation:scIn .22s ease-out}
/* Finding card */
.fc{background:var(--s0);border:2px solid var(--b0);border-radius:18px;padding:18px;transition:border-color .15s,box-shadow .15s}
.fc.act{border-color:var(--red);box-shadow:0 0 0 3px rgba(224,53,53,.1)}
.fc button{min-height:48px}  /* タッチターゲット最小48px */
/* Body map */
.bp{cursor:pointer;transition:fill .18s,stroke .18s;fill:#f1f0e8;stroke:#ccc;stroke-width:1}
.bp:hover{fill:rgba(59,130,246,.15);stroke:#3b82f6}
.bp.sel{fill:rgba(224,53,53,.22);stroke:var(--red);stroke-width:2}
.bl{font-size:9px;font-weight:900;fill:#999;text-transform:uppercase;pointer-events:none;user-select:none}
/* Upload */
.upa{border:3px dashed var(--b1);border-radius:14px;padding:28px;text-align:center;cursor:pointer;transition:all .18s;color:var(--t3);font-size:13px;font-weight:700}
.upa.ok{border-color:var(--green);color:var(--green);background:#f0fdf4}
.upa:hover:not(.ok){border-color:var(--t3)}
/* Irr button */
.irr{padding:11px 16px;border-radius:11px;border:2px solid var(--b1);background:var(--s2);color:var(--t2);font-size:12px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.irr.on{background:#fff7ed;border-color:var(--orange);color:var(--orange)}
/* Live dot */
.ldot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 7px var(--red);animation:pulse 1.5s ease-in-out infinite}
/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}
/* ── スマホ縦向き ── */
@media(max-width:640px){
  .role-grid{grid-template-columns:1fr}
  .inst-side{
    position:fixed;bottom:0;left:0;right:0;
    width:100%!important;height:56px;
    flex-direction:row;padding:0;z-index:20;
    border-right:none;border-top:1px solid var(--b0);
    box-shadow:0 -4px 20px rgba(0,0,0,.06);
  }
  .tab-btn{flex:1;flex-direction:row;gap:5px;font-size:10px;padding:0 3px;border-radius:0;height:56px}
  .tab-btn.on{transform:none;box-shadow:none;background:var(--s2);color:var(--red);border-top:3px solid var(--red)}
  .tab-icon{font-size:18px}
  .inst-main{padding:12px;padding-bottom:68px}
  .inst-body{flex-direction:column}
  #part-top{height:160px!important}
  #pv-wrap{width:110px!important}
  .vv{font-size:clamp(14px,4vw,28px)!important}
  .vl{font-size:8px!important}
  .fc{padding:12px}
  .modal{border-radius:20px 20px 0 0;position:fixed;bottom:0;left:0;right:0;max-width:100%;margin:0;padding:22px 18px 36px}
  .modal-bg{align-items:flex-end;padding:0}
}

/* ── スマホ横向き（landscape）── */
@media(max-height:500px) and (orientation:landscape){
  /* 参加者画面: バイタルを左列・ECGを右に横並び */
  #G-part{padding:6px 10px}
  #part-top{height:140px!important}
  #pv-wrap{width:100px!important}
  .vv{font-size:clamp(12px,3vh,24px)!important}
  .vl{font-size:8px!important}
  #G-part nav{height:24px;margin-bottom:4px}
  /* 想定者: サイドバーを復活（横向きは広いので底タブ不要）*/
  .inst-side{
    position:relative!important;bottom:auto!important;
    width:72px!important;height:auto!important;
    flex-direction:column!important;
    border-right:1px solid var(--b0)!important;border-top:none!important;
  }
  .tab-btn{flex-direction:column!important;height:auto!important;padding:10px 4px!important;font-size:8px!important}
  .inst-main{padding:12px!important;padding-bottom:12px!important}
  .inst-body{flex-direction:row!important}
  /* navを小さく */
  .inst-nav{padding:8px 14px}
  .cases-hdr{padding:10px 16px}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="G-loading" style="display:flex">
  <h1 style="font-size:30px;font-weight:900;letter-spacing:-.02em">救急シミュレーター</h1>
  <div class="spinner"></div>
  <p style="color:rgba(255,255,255,.35);font-size:12px;letter-spacing:.12em">INITIALIZING v19.2</p>
</div>

<!-- Login -->
<div id="G-config" style="display:none">
  <div style="text-align:center;margin-bottom:36px">
    <div style="font-size:52px;margin-bottom:14px">🚑</div>
    <h1 style="font-size:28px;font-weight:900;letter-spacing:-.02em">救急シミュレーター</h1>
    <p style="font-size:12px;opacity:.3;margin-top:6px;letter-spacing:.1em">v19.2</p>
  </div>
  <div class="cfg-box">
    <div>
      <div style="font-size:10px;font-weight:900;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px">パスワード</div>
      <input class="cfg-input" id="login-pass" placeholder="パスワードを入力" type="password" autocomplete="off"
        onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <div id="login-error" style="display:none;background:rgba(224,53,53,.2);border:1px solid rgba(224,53,53,.4);border-radius:10px;padding:10px 14px;font-size:13px;color:#fca5a5"></div>
    <button onclick="doLogin()" id="login-btn" style="background:var(--red);color:#fff;padding:18px;border-radius:13px;font-size:16px;font-weight:900;margin-top:4px;min-height:56px">入室する</button>
  </div>
</div>

<!-- Role -->
<div id="G-role" style="display:none">
  <div style="text-align:center;margin-bottom:40px">
    <h1 style="font-size:clamp(22px,4vw,34px);font-weight:900;line-height:1.3">救急シミュレーター<br><span style="font-size:.55em;opacity:.3;font-weight:400">v19.2</span></h1>
    <p style="font-size:12px;opacity:.4;margin-top:10px">役割を選んでください</p>
  </div>
  <div class="role-grid">
    <button class="role-btn role-instr" onclick="setRole('instructor')">
      <span style="font-size:44px">🖥️</span>
      <span>想定者</span>
      <span style="font-size:12px;font-weight:500;color:#777">（指導・操作）</span>
    </button>
    <button class="role-btn role-part" onclick="setRole('participant')">
      <span style="font-size:44px">👥</span>
      <span>実施者</span>
      <span style="font-size:12px;font-weight:500;opacity:.4">（訓練参加）</span>
    </button>
  </div>
  <button onclick="goLogin()" style="background:none;color:rgba(255,255,255,.3);font-size:12px;padding:16px 24px;border-radius:12px;margin-top:24px;display:block;width:100%;max-width:520px">← 戻る</button>
</div>

<!-- Sync (Participant) -->
<div id="G-sync" style="display:none">
  <div class="sync-ring">📡</div>
  <h2 style="font-size:34px;font-weight:900;margin:28px 0 12px">同期を開始します</h2>
  <p style="color:rgba(255,255,255,.4);margin-bottom:48px">音声・映像の同期が開始されます</p>
  <button onclick="startSync()" style="background:var(--red);color:#fff;padding:20px 0;border-radius:22px;font-size:20px;font-weight:900;width:100%;max-width:340px">開始する</button>
</div>

<!-- Case list -->
<div id="G-cases" style="display:none">
  <div class="cases-hdr">
    <button onclick="goLogin()" class="btn btn-ghost" style="min-height:44px;min-width:44px">← ログイン</button>
    <h1 style="font-size:20px;font-weight:900">症例選択 <span id="room-label" style="font-size:12px;font-weight:500;opacity:.4"></span></h1>
    <div style="width:80px"></div>
  </div>
  <div class="cases-body">
    <div class="cases-grid" id="cases-grid">
      <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--t3)">
        <div class="spinner" style="margin:0 auto 16px"></div>読み込み中...
      </div>
    </div>
  </div>
</div>

<!-- Instructor -->
<div id="G-inst" style="display:none">
  <nav class="inst-nav" style="flex-wrap:wrap;gap:8px">
    <div class="flex ac g3">
      <button onclick="exitCase()" class="btn btn-ghost" style="padding:8px 15px;font-size:12px">← 症例一覧</button>
      <span style="font-size:16px;font-weight:900;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="inst-title">—</span>
    </div>
    <!-- 同期済みバイタル表示 -->
    <div id="vital-indicator" style="flex:1;text-align:center;font-size:11px;font-weight:800;color:var(--green);opacity:0;transition:opacity .4s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px;min-width:0"></div>
    <div class="flex ac g3">
      <button id="edit-btn" onclick="toggleEdit()" style="padding:8px 18px;border-radius:999px;font-size:12px;font-weight:800;background:var(--s2);color:var(--t1)">編集モード</button>
      <button onclick="goBack()" style="background:none;color:var(--t3);font-size:18px;padding:6px" title="初期画面へ">⬅</button>
    </div>
  </nav>
  <div class="inst-body">
    <aside class="inst-side">
      <button class="tab-btn" id="tb-Pre" onclick="setTab('Pre')"><span class="tab-icon">📍</span>接触前</button>
      <button class="tab-btn" id="tb-Init" onclick="setTab('Init')"><span class="tab-icon">❤️</span>ABCDE</button>
      <button class="tab-btn on" id="tb-Vital" onclick="setTab('Vital')"><span class="tab-icon">📈</span>モニター</button>
      <button class="tab-btn" id="tb-Full" onclick="setTab('Full')"><span class="tab-icon">📋</span>全身観察</button>
    </aside>
    <main class="inst-main" id="inst-main"></main>
  </div>
</div>

<!-- Participant -->
<div id="G-part" style="display:none">
  <!-- ナビ -->
  <nav style="height:32px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;padding:0 4px;flex-shrink:0">
    <div class="flex ac g2"><div class="ldot"></div><span style="font-size:10px;font-weight:900;letter-spacing:.4em;color:rgba(255,255,255,.22)">LIVE</span></div>
    <button onclick="exitAndLogout()" style="background:none;color:rgba(255,255,255,.22);font-size:10px;font-weight:900;letter-spacing:.12em;padding:5px 10px;border:1px solid rgba(255,255,255,.07);border-radius:999px">退室</button>
  </nav>

  <!-- 上段: バイタル数値（左）＋ECG（右） -->
  <div id="part-top" style="display:flex;gap:8px;flex-shrink:0;height:280px">
    <!-- バイタル数値（左列: HR・RR・BP・SpO2・Temp 等間隔） -->
    <div id="pv-wrap" style="display:flex;flex-direction:column;justify-content:space-between;width:160px;flex-shrink:0;height:100%;padding:4px 0">

      <!-- HR（最上段） -->
      <div class="vp" style="padding:10px 14px;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;flex:1;min-height:0">
        <div style="color:#ff4444;font-size:11px;font-weight:900;letter-spacing:.1em;margin-bottom:2px">HR</div>
        <div style="display:flex;align-items:baseline;gap:3px">
          <div id="pv-hr" style="color:#ff4444;font-size:clamp(28px,4.5vw,46px);font-weight:900;line-height:1">--</div>
          <div style="color:rgba(255,68,68,.45);font-size:11px;font-weight:700">/min</div>
        </div>

const API = {
  url: '', key: '',
  init(u, k){ this.url=u.replace(/\/+$/,''); this.key=k; },
  headers(){
    return { 'Content-Type':'application/json', 'apikey':this.key, 'Authorization':'Bearer '+this.key, 'Prefer':'return=representation' };
  },
  opts(extra={}){ return {mode:'cors', headers:this.headers(), ...extra}; },
  async get(table, params={}){
    let q = this.url+'/rest/v1/'+table+'?';
    if(params.select) q += 'select='+params.select+'&';
    if(params.order)  q += 'order='+params.order+'&';
    if(params.filter) q += params.filter+'&';
    if(params.limit)  q += 'limit='+params.limit+'&';
    if(params.single) q += 'limit=1&';
    const r = await fetch(q, this.opts({method:'GET'}));
    const data = await r.json();
    if(!r.ok) return {data:null, error:{message: data.message||data.error||JSON.stringify(data)}};
    if(params.single){ return {data: Array.isArray(data)?(data[0]||null):data, error:null}; }
    return {data: Array.isArray(data)?data:[], error:null};
  },
  async insert(table, body){
    const r = await fetch(this.url+'/rest/v1/'+table, this.opts({method:'POST', body:JSON.stringify(body)}));
    const data = await r.json().catch(()=>({}));
    if(!r.ok) return {data:null, error:{message: data.message||data.error||JSON.stringify(data)}};
    return {data, error:null};
  },
  async update(table, body, filter){
    const r = await fetch(this.url+'/rest/v1/'+table+'?'+filter, this.opts({method:'PATCH', body:JSON.stringify(body)}));
    const data = await r.json().catch(()=>({}));
    if(!r.ok) return {data:null, error:{message: data.message||data.error||JSON.stringify(data)}};
    return {data, error:null};
  },
  async upsert(table, body, conflictCol='id'){
    const h = {...this.headers(), 'Prefer':'resolution=merge-duplicates,return=representation'};
    const r = await fetch(this.url+'/rest/v1/'+table+'?on_conflict='+conflictCol, {mode:'cors', method:'POST', headers:h, body:JSON.stringify(body)});
    const data = await r.json().catch(()=>({}));
    if(!r.ok) return {data:null, error:{message: data.message||data.error||JSON.stringify(data)}};
    return {data, error:null};
  },
  async delete(table, filter){
    const r = await fetch(this.url+'/rest/v1/'+table+'?'+filter, this.opts({method:'DELETE'}));
    if(!r.ok){
      const data = await r.json().catch(()=>({}));
      return {error:{message: data.message||data.error||JSON.stringify(data)}};
    }
    return {error:null};
  }
};

/* ====================================================

let wakeLock = null;

async function requestWakeLock(){
  if(!('wakeLock' in navigator)) return; // 非対応ブラウザはスキップ
  try{
    if(wakeLock && !wakeLock.released) return; // すでに取得済み
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', ()=>{
      // 画面がロックされたり別タブになったりすると自動解放される
      // ページが再び表示されたら再取得
      wakeLock = null;
    });
  }catch(e){ console.warn('WakeLock:', e.message); }
}

function releaseWakeLock(){
  if(wakeLock && !wakeLock.released){ wakeLock.release(); wakeLock=null; }
}

// ページが再びアクティブになったら再取得
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible' && (role==='instructor'||role==='participant')){
    requestWakeLock();
  }
});

function hideAll(){

function startSync(){
  audioOn=true;
  // スマホ向けAudioContextをユーザー操作のタイミングで初期化（重要）
  try{
    audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    // 無音を1度再生してunlock
    const buf=audioCtx.createBuffer(1,1,22050);
    const src=audioCtx.createBufferSource();
    src.buffer=buf; src.connect(audioCtx.destination); src.start(0);
    if(audioCtx.state==='suspended') audioCtx.resume();
  }catch(e){ console.warn('AudioContext init:', e); }
  hide('G-sync'); show('G-cases'); loadCases();
}

/* ====================================================
   CASES
   ==================================================== */
async function loadCases(){
  if(isDemo){ cases=[...demoCases]; renderCases(); return; }
  try{
    const {data,error} = await API.get('sim_cases',{select:'*',order:'created_at.desc'});
    if(error) throw new Error(error.message || error.details || JSON.stringify(error));
    cases = data||[];
  }catch(e){
    console.error('loadCases error:', e);
    cases=[];
    const msg = e.message||String(e);
    if(msg.includes('Failed to fetch')||msg.includes('NetworkError')||msg.includes('CORS')){
      alert('通信エラー（CORS）\n\nfile:// で開くと通信できません。\n\n✅ 解決方法:\n① GitHub Pagesにアップして https:// で開く\n② またはターミナルで:\n   python3 -m http.server 8080\n   → http://localhost:8080 で開く');
    } else if(msg.includes('does not exist')||msg.includes('relation')){
      alert('テーブルが見つかりません。\nSupabaseのSQL Editorでテーブルを作成してください。');
    }
  }
  renderCases();
  // ポーリングで症例リストを定期更新（5秒）
  if(casesSub) clearInterval(casesSub);
  if(!isDemo) casesSub = setInterval(loadCasesQuiet, 5000);
}

function renderCases(){
  const rl=$('room-label');
  if(rl) rl.textContent = role==='instructor' ? '想定者モード' : '実施者モード';
  const g=$('cases-grid'); g.innerHTML='';
  cases.forEach(c=>{
    const d=document.createElement('div');
    d.className='case-card';
    d.innerHTML=`
      <div style="flex:1;min-width:0">
        <div style="font-size:17px;font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.title)}</div>
      </div>
      <div class="flex ac g2" style="flex-shrink:0;margin-left:8px">
        ${role==='instructor'?`
          <button onclick="copyCase('${c.id}',event)"
            style="background:none;color:var(--t3);font-size:17px;padding:7px;border-radius:10px;min-width:36px;min-height:36px"
            title="コピー">⎘</button>
          <button onclick="deleteCase('${c.id}',event)"
            style="background:none;color:var(--t3);font-size:17px;padding:7px;border-radius:10px;min-width:36px;min-height:36px"
            title="削除">🗑️</button>
        `:''}
        <span style="color:var(--t3);font-size:20px">›</span>
      </div>`;
    d.addEventListener('click',()=>selectCase(c.id));
    g.appendChild(d);
  });
  if(role==='instructor'){
    const b=document.createElement('button');
    b.className='add-card';
    b.innerHTML='<span style="font-size:28px">+</span><span style="font-size:13px;font-weight:900">新規症例を作成</span>';
    b.onclick=()=>show('M-addcase');
    g.appendChild(b);
  }
}

async function createCase(){
  const t=$('new-title').value.trim(); if(!t) return;
  const f=JSON.stringify({Pre:[],Init:[],Full:[]});
  if(isDemo){
    demoCases.unshift({id:'d'+Date.now(),title:t,findings:{Pre:[],Init:[],Full:[]},created_at:Date.now()});
    cases=[...demoCases];
  }else{
    const {error} = await API.insert('sim_cases',{title:t,findings:f,created_at:new Date().toISOString()});
    if(error){ alert('作成エラー: '+(error.message||JSON.stringify(error))); return; }
    await loadCases();
  }
  $('new-title').value=''; closeModal('M-addcase');
  if(isDemo) renderCases();
}

async function copyCase(cid,e){
  e.stopPropagation();
  const orig=cases.find(c=>c.id===cid); if(!orig) return;
  const fs=typeof orig.findings==='string'?orig.findings:JSON.stringify(orig.findings);
  if(isDemo){
    demoCases.unshift({id:'d'+Date.now(),title:orig.title+' (コピー)',findings:pf(orig),created_at:Date.now()});
    cases=[...demoCases]; renderCases();
  }else{
    const {error} = await API.insert('sim_cases',{title:orig.title+' (コピー)',findings:fs,created_at:new Date().toISOString()});
    if(error){ alert('コピーエラー: '+(error.message||JSON.stringify(error))); }
  }
}

async function deleteCase(cid,e){
  e.stopPropagation();
  const orig=cases.find(c=>c.id===cid); if(!orig) return;
  if(!confirm(`「${orig.title}」を削除しますか？\nこの操作は取り消せません。`)) return;
  if(isDemo){
    demoCases = demoCases.filter(c=>c.id!==cid);
    cases = [...demoCases]; renderCases();
  }else{
    const {error} = await API.delete('sim_cases','id=eq.'+encodeURIComponent(cid));
    if(error){ alert('削除エラー: '+(error.message||JSON.stringify(error))); return; }
    await loadCases();
  }
}

// 症例リストをバックグラウンドで静かに更新
async function loadCasesQuiet(){
  if(isDemo||!API.key) return;
  const {data} = await API.get('sim_cases',{select:'*',order:'created_at.desc'}).catch(()=>({data:null}));
  if(data && JSON.stringify(data)!==JSON.stringify(cases)){ cases=data; renderCases(); }
}

function pf(c){ // parse findings
  if(!c) return {Pre:[],Init:[],Full:[]};
  if(typeof c.findings==='string'){ try{ return JSON.parse(c.findings); }catch(e){} }
  return c.findings||{Pre:[],Init:[],Full:[]};
}

function selectCase(cid){
  caseId=cid; curCase=cases.find(c=>c.id===cid);

  // ===== iOS Safari 音声unlock（ユーザータップの同期処理内で必須）=====
  // 1. AudioContext unlock（メトロノーム用）
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const buf=audioCtx.createBuffer(1,1,22050);
    const src=audioCtx.createBufferSource();
    src.buffer=buf; src.connect(audioCtx.destination); src.start(0);
  }catch(e){}

  // 2. <audio>要素 unlock（聴診音・音声再生用）
  // iOSはユーザー操作の同期タイミングで一度でも play() を呼ばないと
  // 後からポーリングで呼んでも再生できない
  const unlockAudio = (el) => {
    el.muted = true;
    el.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
    const p = el.play();
    if(p) p.then(()=>{ el.pause(); el.muted=false; el.src=''; }).catch(()=>{ el.muted=false; el.src=''; });
  };
  unlockAudio($('bg-audio'));
  unlockAudio($('sp-audio'));
  audioOn = true;
  // =====================================================================

  hide('G-cases');
  requestWakeLock(); // 画面スリープ防止を開始
  if(role==='instructor'){
    show('G-inst'); $('inst-title').textContent=curCase?.title||'';
    setTab('Vital'); subSession();
  }else{
    show('G-part'); subSession(); startECG();
  }
}

function exitCase(){
  caseId=null; curCase=null;
  stopECG(); unsub(); stopMetro();
  releaseWakeLock(); // 画面スリープ防止を解除
  hideAll(); show('G-cases'); loadCases();
}

   SESSION SYNC

async function subSession(){
  if(isDemo) return;
  if(reSub){ clearInterval(reSub); reSub=null; }
  if(pollTimer){ clearInterval(pollTimer); pollTimer=null; }
  await fetchSession();
  // ポーリングで同期（2秒）
  pollTimer = setInterval(fetchSession, 2000);
}

async function fetchSession(){
  if(isDemo||!API.key) return;
  try{
    const {data,error}=await API.get('sim_sessions',{select:'*',filter:'case_id=eq.'+encodeURIComponent((currentRoom||'00')+'-'+caseId),single:true});
    if(error) console.warn('fetchSession:', error.message||JSON.stringify(error));
    if(data) applySession(data);
  }catch(e){ console.warn('fetchSession ex:', e); }
}

function applySession(data){
  // speechId は比較用に先に取得（スプレッドコピーでは参照が変わるため）
  const prevSpeechId = SS.speechId||'';
  const prev={...SS, speechId: prevSpeechId};
  try{
    if(data.active_finding_ids!=null) SS.activeFindingIds=data.active_finding_ids;
    if(data.playing_sound_url!==undefined) SS.playingSoundUrl=data.playing_sound_url;
    if(data.is_speaking_text!==undefined) SS.isSpeakingText=data.is_speaking_text;
    if(data.speech_url!==undefined) SS.speechUrl=data.speech_url;
    if(data.speech_id!==undefined) SS.speechId=data.speech_id;
    if(data.metronome!=null) SS.metronome=typeof data.metronome==='string'?JSON.parse(data.metronome):data.metronome;
    if(data.vitals!=null) SS.vitals=typeof data.vitals==='string'?JSON.parse(data.vitals):data.vitals;
    if(data.show_vitals!=null) SS.showVitals=data.show_vitals;
    if(data.abcde!=null) SS.abcde=typeof data.abcde==='string'?JSON.parse(data.abcde):data.abcde;
  }catch(e){ console.error(e); }
  // メトロノームのON/OFFが変化したら即反映
  const metroWasOn = prev.metronome?.on;
  const metroNowOn = SS.metronome?.on;
  if(metroNowOn && !metroWasOn){ startMetro(); }
  else if(!metroNowOn && metroWasOn){ stopMetro(); }
  if(role==='participant') applyPartState(SS,prev);
  // 想定者側もメイン再描画してON/OFFボタンを更新
  if(role==='instructor' && activeTab==='Init') renderMain();
}

async function pushSession(updates){
  Object.assign(SS,updates);
  if(isDemo){
    if(role==='participant') applyPartState(SS,{});
    return;
  }
  const pl={
    case_id:(currentRoom||'00')+'-'+caseId,
    active_finding_ids:SS.activeFindingIds,
    playing_sound_url:SS.playingSoundUrl,
    is_speaking_text:SS.isSpeakingText,
    speech_url:SS.speechUrl,
    speech_id:SS.speechId,
    metronome:SS.metronome,
    vitals:SS.vitals,
    show_vitals:SS.showVitals,
    abcde:SS.abcde,
    updated_at:new Date().toISOString()
  };
  const {error} = await API.upsert('sim_sessions', pl, 'case_id');
  if(error) console.error('pushSession error:', error.message||JSON.stringify(error));
}

function unsub(){
  if(reSub){ clearInterval(reSub); reSub=null; }
  if(casesSub){ clearInterval(casesSub); casesSub=null; }
  if(pollTimer){ clearInterval(pollTimer); pollTimer=null; }
}

// base64 または URL どちらでも再生できるヘルパー（iOS Safari対応）
function playAudioData(audioEl, src, loop){
  try{
    audioEl.loop = loop;
    // base64 → Blob URL に変換（iOS Safariはdata:URIの<audio>を再生できない場合がある）
    let playUrl = src;
    if(src.startsWith('data:')){
      const [header, b64] = src.split(',');
      const mime = header.match(/:(.*?);/)[1];
      const bin  = atob(b64);
      const arr  = new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
      const blob = new Blob([arr], {type:mime});
      if(audioEl.dataset.blobUrl) URL.revokeObjectURL(audioEl.dataset.blobUrl);
      playUrl = URL.createObjectURL(blob);
      audioEl.dataset.blobUrl = playUrl;
    }
    audioEl.src = playUrl;
    audioEl.load(); // iOSではload()を明示的に呼ぶ
    audioEl.currentTime = 0;
    const p = audioEl.play();
    if(p) p.catch(e=>{
      console.warn('audio play failed:', e.message);
      // NotAllowedError = まだunlockされていない → 次のポーリングで再試行
      if(e.name==='NotAllowedError'){
        audioEl.dataset.soundId = ''; // IDをリセットして次回再試行させる
      }
    });
  }catch(e){ console.warn('playAudioData error:', e); }
}

function applyPartState(s,prev){
  // vitals
  const v=s.vitals||{};
  if(s.showVitals){
    // モニター表示中：実際の値を表示
    $('pv-hr').textContent   = (v.hr&&v.hr!=='')?v.hr:'--';
    $('pv-bp').textContent   = (v.bpSys||'--')+'/'+(v.bpDia||'--');
    $('pv-spo2').textContent = (v.spo2||'--')+'%';
    $('pv-temp').textContent = (v.temp||'--')+'°C';
    $('pv-rr').textContent   = (v.rr||'--')+' /min';
    const rl=$('ecg-rhy-lbl'); if(rl) rl.textContent=(v.rhythmType||'SR')+' SIGNAL';
    // 待機表示を隠す、ラベルを表示
    const sb=$('ecg-standby'); if(sb) sb.style.display='none';
    const lw=$('ecg-label-wrap'); if(lw) lw.style.display='';
  } else {
    // 待機中：すべて「--」
    $('pv-hr').textContent  = '--';
    $('pv-bp').textContent  = '--/--';
    $('pv-spo2').textContent= '--';
    $('pv-temp').textContent= '--°C';
    $('pv-rr').textContent  = '-- /min';
    const sb=$('ecg-standby'); if(sb) sb.style.display='flex';
    const lw=$('ecg-label-wrap'); if(lw) lw.style.display='none';
  }
  // ECG params
  ecgBpm=parseInt(v.hr)||72; ecgRhythm=v.rhythmType||'SR'; ecgSweep=v.sweepSpeed||160;
  // showVitals が初めてtrueになったらECG開始
  if(s.showVitals && !ecgRaf){ startECG(); }
  else if(!s.showVitals){ stopECG(); }
  // findings overlay
  renderFO(s);
  // metronome pill
  const mp=$('metro-pill');
  if(mp){ mp.style.display=s.metronome?.on?'flex':'none'; }
  if(s.metronome?.on){
    $('metro-bpm-pill').textContent=s.metronome.bpm+' BPM'+(s.metronome.isIrregular?' (不整)':'');
    const dot=$('metro-dot');
    if(dot) dot.style.animation=`pulse ${60/s.metronome.bpm}s ease-in-out infinite`;
  }
  // audio
  if(audioOn){
    const ba=$('bg-audio');
    if(s.playingSoundUrl){
      // src比較はIDで行う（base64は長すぎてsrc比較が不安定）
      if(ba.dataset.soundId !== s.playingSoundUrl.slice(-32)){
        ba.dataset.soundId = s.playingSoundUrl.slice(-32);
        playAudioData(ba, s.playingSoundUrl, true);
      }
    } else {
      if(!ba.paused){ ba.pause(); }
      ba.dataset.soundId='';
    }
    // speech: IDが変わったときだけ再生
    const prevSpeechId = prev?.speechId||'';
    const curSpeechId  = s.speechId||'';
    if(s.speechUrl && curSpeechId && curSpeechId !== prevSpeechId){
      const sa=$('sp-audio');
      playAudioData(sa, s.speechUrl, false);
    }
  }
}

function _resizeFOCards(inner){
  if(!inner) return;
  const cards = Array.from(inner.children);
  const n = cards.length;
  if(n===0) return;
  const avail = inner.offsetWidth || (window.innerWidth - 20);
  const gap = 10;

  if(n===1){
    // 1枚: 親コンテナ全幅・中央配置
    const c = cards[0];
    c.style.width    = avail+'px';
    c.style.minWidth = avail+'px';
    c.style.maxWidth = avail+'px';
    c.style.flexShrink = '0';
    c.style.height   = '100%';
    c.style.boxSizing = 'border-box';
    inner.style.justifyContent = 'center';
  } else {
    // 複数枚: 横並び、均等幅（最小160px、超えたらスクロール）
    inner.style.justifyContent = 'flex-start';
    let w;
    if(n===2)      w = Math.floor((avail - gap) / 2);
    else if(n===3) w = Math.floor((avail - gap*2) / 3);
    else           w = Math.max(160, Math.floor((avail - gap*2) / 3));
    cards.forEach(c=>{
      c.style.width    = w+'px';
      c.style.minWidth = w+'px';
      c.style.maxWidth = w+'px';
      c.style.flexShrink = '0';
      c.style.height   = '100%';
      c.style.boxSizing = 'border-box';
    });
  }
}

/* ====================================================
   ECG
   ==================================================== */
function startECG(){
  stopECG();
  const c=$('ecg-canvas'); if(!c) return;
  // showVitals が false（初期状態）ではECGを描画しない
  if(!SS.showVitals) return;
  ecgX=0; ecgLY=null; ecgLT=0; ecgBS=0;
  ecgPBS=0;
  ecgVTPhase=0;
  ecg2ndCount=0;
  ecgBeepLastTs=0;
  const v=SS.vitals||{};
  ecgBpm=parseInt(v.hr)||72;
  ecgRhythm=v.rhythmType||'SR';
  ecgSweep=v.sweepSpeed||160;
  ecgRaf=requestAnimationFrame(ecgDraw);
}
function stopECG(){ if(ecgRaf){ cancelAnimationFrame(ecgRaf); ecgRaf=null; } }

// ECG用追加ステート
let ecgPBS=0, ecgVTPhase=0, ecg2ndCount=0;

function ecgDraw(ts){
  const c=$('ecg-canvas'); if(!c){ ecgRaf=null; return; }
  const ctx=c.getContext('2d');
  const W=c.parentElement.offsetWidth, H=c.parentElement.offsetHeight;
  if(c.width!==W||c.height!==H){ c.width=W; c.height=H; ecgLY=null; }
  const cy=H/2;
  if(!ecgLT){ ecgLT=ts; ecgBS=ts; ecgPBS=ts; }
  const dt=ts-ecgLT; ecgLT=ts;

  // メインビート間隔（Afはジッタあり）
  const bi=60000/(ecgBpm*(ecgRhythm==='Af'?ecgAJ:1));
  let el=ts-ecgBS;
  if(el>=bi){
    ecgBS=ts; el=0;
    ecgAJ=ecgRhythm==='Af'?(0.6+Math.random()*0.8):1;
    // 2度AVB: 拍カウント更新
    if(ecgRhythm==='2nd_AVB'){ ecg2ndCount=(ecg2ndCount+1)%3; }

    // ===== R波頂点でビープ音（QRS発生タイミング）=====
    // QRS脱落拍・VF・VTはスキップ（不規則/ビープ不適）
    const hasQRS = !(ecgRhythm==='2nd_AVB' && ecg2ndCount===0)
                && ecgRhythm!=='VF';
    if(hasQRS && audioOn && SS.showVitals){
      ecgBeep();
    }
  }

  // 3度AVB用 P波独立ビート（75bpm固定）
  const pbi=60000/75;
  if(ecgRhythm==='3rd_AVB' && ts-ecgPBS>=pbi){ ecgPBS=ts; }
  const pel=ecgRhythm==='3rd_AVB'?ts-ecgPBS:0;

  // VT/VF 位相を時間から累積
  if(ecgRhythm==='VT') ecgVTPhase+=dt/160;
  if(ecgRhythm==='VF') ecgVTPhase+=dt/80;  // VFは速い

  const dx=(ecgSweep*dt)/1000;
  const dy=ecgDefl(el,pel,ecgRhythm);
  const fy=cy-dy;
  ctx.beginPath(); ctx.strokeStyle='#00ff41'; ctx.lineWidth=Math.min(2.5,W/250);
  ctx.lineCap='round'; ctx.lineJoin='round';
  if(ecgLY!==null&&ecgX>0){ ctx.moveTo(ecgX-dx,ecgLY); ctx.lineTo(ecgX,fy); ctx.stroke(); }
  ecgLY=fy;
  ctx.clearRect(ecgX+1,0,44,H);
  ecgX+=dx; if(ecgX>=W){ ecgX=0; ctx.clearRect(0,0,50,H); }
  ecgRaf=requestAnimationFrame(ecgDraw);
}

function ecgDefl(t, pel, r){
  // 基本パラメータ
  const PD=100, QD=80, STD=260;
  const PRI = r==='1st_AVB' ? 280 : 160;  // 1度AVB: PR延長

  // VT: 正弦波ベースのワイドQRS
  if(r==='VT'){
    const vt=(ecgVTPhase%1);
    return Math.sin(vt*Math.PI*2)*70 + Math.sin(vt*Math.PI*4)*18;
  }

  // VF: 不規則な低振幅ノイズ（全てランダム）
  if(r==='VF'){
    const s1 = Math.sin(t * 0.35 + ecgVTPhase*6) * 38;
    const s2 = Math.sin(t * 0.22 + ecgVTPhase*9) * 22;
    const s3 = (Math.random()-0.5) * 18;
    const s4 = Math.sin(t * 0.55 + ecgVTPhase*4) * 14;
    return s1 + s2 + s3 + s4;
  }

  // P波（半正弦波）
  const pw = t2 => (t2>=0 && t2<PD) ? Math.sin((t2/PD)*Math.PI)*10 : 0;

  // QRS波（鋭いスパイク：Q小→R大→S小）
  const qrs = t2 => {
    const qs=PRI;
    if(t2<qs || t2>=qs+QD) return 0;
    const qp=(t2-qs)/QD;
    if(qp<0.10) return -qp/0.10 * 8;           // Q波（小さく下向き）
    if(qp<0.35) return -8+((qp-0.10)/0.25)*128; // R上昇
    if(qp<0.60) return 120-((qp-0.35)/0.25)*132;// R下降→S
    if(qp<0.80) return -12+((qp-0.60)/0.20)*12; // S回復
    return 0;
  };

  // ST-T波
  const stTwave = t2 => {
    const stStart = PRI+QD;
    if(t2 < stStart) return 0;
    const stEl = t2 - stStart;
    // ST上昇: QRS直後から平坦に持ち上がる
    const stElev = r==='ST_ELEV' ? 18 : 0;
    // ST部分（40ms平坦）
    if(stEl < 40) return stElev;
    // T波（なだらかな山）
    const tEl = stEl - 40;
    if(tEl >= STD) return 0;
    const tp = tEl/STD;
    const tAmp = r==='ST_ELEV' ? 42 : 22;
    return Math.sin(tp*Math.PI)*tAmp + stElev*(1-tp);
  };

  // Af: P波なし・基線ゆらぎ・RR不整
  if(r==='Af'){
    const noise=(Math.random()-0.5)*5 + Math.sin(t*0.08)*2;
    return noise + qrs(t) + stTwave(t);
  }

  // 3度AVB: P波とQRSが完全独立
  if(r==='3rd_AVB'){
    return pw(pel) + qrs(t) + stTwave(t);
  }

  // 2度AVB（Mobitz II型）: 3拍に1回QRS脱落（P波のみ）
  if(r==='2nd_AVB'){
    if(ecg2ndCount===0) return pw(t); // QRS脱落（P波のみ）
    return pw(t) + qrs(t) + stTwave(t);
  }

  // SR / ST / SB / 1st_AVB / ST_ELEV: 標準波形
  return pw(t) + qrs(t) + stTwave(t);
}

/* ====================================================
   ECG BEEP（R波頂点に同期したビープ音）
   ==================================================== */
let ecgBeepLastTs = 0;
function ecgBeep(){
  if(!audioCtx) return;
  if(audioCtx.state==='suspended'){ audioCtx.resume(); return; }
  // 直前のビープから100ms以内は無視（多重発火防止）
  const now = audioCtx.currentTime;
  if(now - ecgBeepLastTs < 0.1) return;
  ecgBeepLastTs = now;
  try{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, now);          // 880Hz（聴き取りやすい音程）
    gain.gain.setValueAtTime(0.0, now);
    gain.gain.linearRampToValueAtTime(0.25, now + 0.005); // 急速に立ち上がり
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08); // 80msで減衰
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.08);
  }catch(e){}
}

/* ====================================================
   METRONOME
   ==================================================== */
function startMetro(){
  stopMetro();
  // AudioContext が suspended なら resume してから開始
  if(audioCtx && audioCtx.state==='suspended'){
    audioCtx.resume().then(()=>_metroTick());
  } else {
    _metroTick();
  }
}
function _metroTick(){
  if(!SS.metronome.on||!audioOn){ metroTimer=null; return; }
  // 実施者のみメトロノーム音を鳴らす（想定者は無音）
  if(role==='participant'){
    try{
      if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      if(audioCtx.state==='suspended'){ audioCtx.resume(); }
      const a=audioCtx, o=a.createOscillator(), g=a.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(660, a.currentTime);
      g.gain.setValueAtTime(0.12, a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+0.1);
      o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+0.1);
    }catch(e){ console.warn('metro tick error:', e); }
  }
  let iv=(60/SS.metronome.bpm)*1000;
  if(SS.metronome.isIrregular) iv*=(0.6+Math.random()*0.8);
  metroTimer=setTimeout(_metroTick, iv);
}
function stopMetro(){ if(metroTimer){ clearTimeout(metroTimer); metroTimer=null; } }

/* ====================================================
   プリセット管理（localStorage）
   ==================================================== */
const PRESET_KEY = 'kyukyu_presets_' + (currentRoom||'r1');

function getPresets(){
  try{ return JSON.parse(localStorage.getItem(PRESET_KEY)||'[]'); }catch(e){ return []; }
}
function savePresets(list){ localStorage.setItem(PRESET_KEY, JSON.stringify(list)); }

function savePreset(){
  const nameEl = $('preset-name');
  const name = nameEl ? nameEl.value.trim() : '';
  if(!name){ alert('プリセット名を入力してください'); return; }
  const list = getPresets();
  // 同名があれば上書き確認
  const existing = list.findIndex(p=>p.name===name);
  if(existing>=0){
    if(!confirm(`「${name}」は既に存在します。上書きしますか？`)) return;
    list[existing] = { name, vitals:{...LV}, savedAt: Date.now() };
  } else {
    list.unshift({ name, vitals:{...LV}, savedAt: Date.now() });
  }
  savePresets(list);
  if(nameEl) nameEl.value='';
  renderMain();
}

function loadPreset(idx){
  const list = getPresets();
  if(!list[idx]) return;
  LV = {...LV, ...list[idx].vitals};
  renderMain();
  // 自動同期するか確認
  if(confirm(`「${list[idx].name}」を読み込みました。
実施者端末に同期しますか？`)){
    pushVitals();
  }
}

function deletePreset(idx){
  const list = getPresets();
  if(!list[idx]) return;
  if(!confirm(`「${list[idx].name}」を削除しますか？`)) return;
  list.splice(idx,1);
  savePresets(list);
  renderMain();
}

// リズム選択時にHRを自動セット
const RHYTHM_DEFAULT_HR = {
  'SR':      72,
  'ST':     120,
  'SB':      48,
  'Af':      88,
  '1st_AVB': 65,
  '2nd_AVB': 60,
  '3rd_AVB': 40,
  'VT':     180,
  'VF':      null,   // VF: HRは計測不能
  'ST_ELEV': 88,
};
function setLV(k,v){
  LV[k]=v;
  if(k==='rhythmType'){
    const def = RHYTHM_DEFAULT_HR[v];
    if(def===null){
      LV.hr = '－';  // VF: HR計測不能
    } else if(def!==undefined){
      LV.hr = String(def);
    }
  }
  renderMain();
}
async function hideVitals(){
  const nowShowing = SS.showVitals;
  await pushSession({ showVitals: !nowShowing });
  // ナビバー更新
  const indicator = $('vital-indicator');
  if(indicator){
    if(nowShowing){
      indicator.textContent = '🙈 バイタル非表示中';
      indicator.style.color = 'var(--t3)';
    } else {
      indicator.textContent = `✅ 同期済 ｜ HR ${LV.hr||'--'} ／ BP ${LV.bpSys||'--'}/${LV.bpDia||'--'} ／ SpO₂ ${LV.spo2||'--'}% ／ ${LV.rhythmType||'SR'}`;
      indicator.style.color = 'var(--green)';
    }
    indicator.style.opacity = '1';
  }
  renderMain();
}

async function pushVitals(){
  const btn = document.querySelector('[onclick="pushVitals()"]');
  if(btn){ btn.disabled=true; btn.innerHTML='⏳ 送信中...'; }
  await pushSession({vitals:{...LV},showVitals:true});
  // 送信完了フィードバック
  if(btn){
    btn.innerHTML='✅ 同期完了';
    btn.style.background='var(--green)';
    setTimeout(()=>{
      btn.innerHTML='📤 同期';
      btn.style.background='';
      btn.disabled=false;
    }, 2000);
  }
  // ナビバーに現在のバイタル値を表示
  const indicator = $('vital-indicator');
  if(indicator){
    indicator.textContent = `✅ 同期済 ｜ HR ${LV.hr||'--'} ／ BP ${LV.bpSys||'--'}/${LV.bpDia||'--'} ／ SpO₂ ${LV.spo2||'--'}% ／ ${LV.rhythmType||'SR'}`;
    indicator.style.opacity='1';
  }
  // ボタン下のステータス表示
  const ss=$('sync-status');
  if(ss){
    ss.style.display='block';
    ss.innerHTML=`✅ 実施者端末に同期しました<br><span style="font-size:11px;font-weight:600;color:#15803d;opacity:.8">HR ${LV.hr||'--'} ／ BP ${LV.bpSys||'--'}/${LV.bpDia||'--'} ／ SpO₂ ${LV.spo2||'--'}% ／ RR ${LV.rr||'--'} ／ Temp ${LV.temp||'--'}°C ／ ${LV.rhythmType||'SR'}</span>`;
    setTimeout(()=>{ ss.style.display='none'; }, 5000);
  }
}

/* ====================================================
   ABCDE 口頭付与
   ==================================================== */
function updateAbcde(key, val){
  SS.abcde = {...(SS.abcde||{}), [key]: val};
  pushSession({ abcde: SS.abcde });
}

function toggleAbcdeDisplay(key){
  const cur = (SS.abcde||{}).activeKey;
  const newKey = cur===key ? null : key;   // 同じキーなら閉じる
  SS.abcde = {...(SS.abcde||{}), activeKey: newKey};
  pushSession({ abcde: SS.abcde });
  renderMain();
}

function clearAbcde(){
  if(!confirm('すべての口頭付与内容を消去しますか？')) return;
  SS.abcde = { A:'', B:'', C:'', D:'', E:'', activeKey:null };
  pushSession({ abcde: SS.abcde });
  renderMain();
}

function toggleMetro(){
  const on=!SS.metronome.on;
  // AudioContextをユーザー操作のタイミングで確実にunlock
  if(on){
    try{
      if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      if(audioCtx.state==='suspended') audioCtx.resume();
    }catch(e){}
  }
  pushSession({metronome:{...SS.metronome,on}});
  if(on) startMetro(); else stopMetro();
  renderMain();
}
function setMetroBpm(v){ SS.metronome.bpm=parseInt(v)||100; pushSession({metronome:{...SS.metronome}}); }
function toggleIrr(){ pushSession({metronome:{...SS.metronome,isIrregular:!SS.metronome.isIrregular}}); renderMain(); }

        <div style="font-size:13px;font-weight:900;color:var(--t0)">${name}</div>
        <div style="font-size:10px;color:${c>0?border:'var(--t3)'};margin-top:1px">${c>0?c+'件の所見':'所見なし'}</div>
      </div>
      ${c>0?`<span style="background:${border};color:#fff;border-radius:999px;font-size:10px;font-weight:900;padding:2px 7px">${c}</span>`:''}
      <span style="color:var(--t3);font-size:16px">›</span>
    </button>`;
  };

  return `
  <div style="max-width:800px;margin:0 auto">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">

      <!-- 前面 -->
      <div style="background:var(--s0);border-radius:20px;border:1.5px solid var(--b0);overflow:hidden">
        <div style="padding:14px 16px 0;display:flex;align-items:center;gap:8px">
          <span style="background:#dbeafe;color:#1d4ed8;font-size:10px;font-weight:900;padding:3px 10px;border-radius:999px">前面</span>
        </div>
        <!-- SVG人形 -->
        <div style="padding:8px 24px 0">
          ${svgFigure('front')}
        </div>
        <!-- ボタンリスト -->
        <div style="padding:12px;display:flex;flex-direction:column;gap:6px">
          ${mkBtn('頭部',   'front','🧠','#e0e7ff','#6366f1')}
          ${mkBtn('胸部',   'front','❤️','#fce7f3','#ec4899')}
          ${mkBtn('腹部',   'front','🫁','#fef3c7','#f59e0b')}
          ${mkBtn('上肢',   'front','💪','#d1fae5','#10b981')}
          ${mkBtn('下肢',   'front','🦵','#dbeafe','#3b82f6')}
        </div>
      </div>

      <!-- 背面 -->
      <div style="background:var(--s0);border-radius:20px;border:1.5px solid var(--b0);overflow:hidden">
        <div style="padding:14px 16px 0;display:flex;align-items:center;gap:8px">
          <span style="background:#f3e8ff;color:#7c3aed;font-size:10px;font-weight:900;padding:3px 10px;border-radius:999px">背面</span>
        </div>
        <div style="padding:8px 24px 0">
          ${svgFigure('back')}
        </div>
        <div style="padding:12px;display:flex;flex-direction:column;gap:6px">
          ${mkBtn('後頭部', 'back','🔵','#e0e7ff','#6366f1')}
          ${mkBtn('背部',   'back','🟣','#f3e8ff','#a855f7')}
          ${mkBtn('殿部',   'back','🟤','#fef3c7','#d97706')}
          ${mkBtn('上肢背面','back','💪','#d1fae5','#10b981')}
          ${mkBtn('下肢背面','back','🦵','#dbeafe','#3b82f6')}
        </div>
      </div>

    </div>
    <p style="text-align:center;margin-top:14px;color:var(--t3);font-size:11px;font-weight:700">
      人形または部位ボタンをタップして選択
    </p>
  </div>`;
}

function selectPart(part,side){ bodyPart=part; bodySide=side; renderMain(); }

/* ====================================================
   FINDINGS
   ==================================================== */
function findingsHTML(tab){
  const findings=pf(curCase);
  let list=(findings[tab]||[]);
  if(tab==='Full'&&bodyPart) list=list.filter(f=>f.bodyPart===bodyPart&&(!f.side||f.side===bodySide));
  return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px">
    ${list.map(f=>fcHTML(f,tab)).join('')}
    ${editMode?`<button onclick="openFindingForm(null,'${tab}')" 
      style="border:3px dashed var(--b1);background:transparent;border-radius:18px;padding:28px;color:var(--t3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;cursor:pointer;transition:all .2s;font-size:12px;font-weight:900"
      onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--red)'"
      onmouseout="this.style.borderColor='var(--b1)';this.style.color='var(--t3)'">
      <span style="font-size:26px">+</span>新規所見追加
    </button>`:''}
  </div>`;
}

function fcHTML(f,tab){
  const aImg=SS.activeFindingIds.includes(f.id);
  const aSnd=SS.playingSoundUrl===f.url;
  const aSpk=SS.speechId===f.id;
  const tl=f.type==='image'?'画像':f.type==='speech'?'音声':'聴診音';
  const tc=f.type==='image'?'var(--blue)':f.type==='speech'?'var(--blue)':'var(--orange)';
  let abtn='';
  if(f.type==='image'){
    abtn=`<button onclick="togImg('${f.id}')" style="width:100%;padding:11px;border-radius:11px;font-size:12px;font-weight:900;color:#fff;background:${aImg?'var(--red)':'#111'}">${aImg?'解除する':'表示する'}</button>`;
  }else if(f.type==='speech'){
    abtn=`<button onclick="togSpk('${f.id}')" style="width:100%;padding:11px;border-radius:11px;font-size:12px;font-weight:900;color:#fff;background:${aSpk?'var(--red)':'var(--blue)'}">${aSpk?'再生停止':'音声を再生'}</button>`;
  }else{
    abtn=`<button onclick="togSnd('${f.id}')" style="width:100%;padding:11px;border-radius:11px;font-size:12px;font-weight:900;color:#fff;background:${aSnd?'var(--red)':'var(--orange)'}">${aSnd?'聴診停止':'聴診音を再生'}</button>`;
  }
  return `<div class="fc${aImg||aSnd||aSpk?' act':''}">
    <div class="flex jsb ac" style="margin-bottom:11px">
      <div>
        <div style="font-size:10px;font-weight:900;color:${tc};text-transform:uppercase;margin-bottom:3px">${tl}</div>
        <div style="font-size:14px;font-weight:900">${esc(f.label)}</div>
      </div>
      ${editMode?`<div class="flex g2">
        <button onclick="openFindingForm(${encodeF(f)},'${tab}')" style="background:none;color:#93c5fd;font-size:15px;padding:4px;border-radius:6px">✏️</button>
        <button onclick="delFinding('${f.id}','${tab}')" style="background:none;color:#fca5a5;font-size:15px;padding:4px;border-radius:6px">🗑️</button>
      </div>`:''}
    </div>
    ${abtn}
  </div>`;
}

function encodeF(f){ return "'"+btoa(unescape(encodeURIComponent(JSON.stringify(f))))+"'"; }
function decodeF(s){ try{ return JSON.parse(decodeURIComponent(escape(atob(s)))); }catch(e){ return null; } }

function togImg(id){
  const ids=SS.activeFindingIds.includes(id)?SS.activeFindingIds.filter(i=>i!==id):[...SS.activeFindingIds,id];
  pushSession({activeFindingIds:ids}); renderMain();
}
function togSpk(id){
  const f=getAllFindings().find(x=>x.id===id);
  const active=SS.speechId===id;
  pushSession({speechId:active?null:id, speechUrl:active?null:(f?.url||null), isSpeakingText:active?null:(f?.description||f?.label||null)});
  renderMain();
}
function togSnd(id){
  const f=getAllFindings().find(x=>x.id===id);
  const playing=SS.playingSoundUrl===f?.url;
  pushSession({playingSoundUrl:playing?null:(f?.url||null)});
  renderMain();
}
function getAllFindings(){
  const fs=pf(curCase); return [...(fs.Pre||[]),...(fs.Init||[]),...(fs.Full||[])];
}

async function delFinding(id,tab){
  if(!confirm('この所見を削除しますか？')) return;
  const fs=pf(curCase); fs[tab]=(fs[tab]||[]).filter(f=>f.id!==id);
  await writeFindings(fs);
}

async function writeFindings(fs){
  const s=JSON.stringify(fs);
  if(isDemo){
    const c=demoCases.find(c=>c.id===caseId);
    if(c){ c.findings=fs; curCase={...curCase,findings:fs}; cases=[...demoCases]; }
  }else{
    const {error} = await API.update('sim_cases',{findings:s},'id=eq.'+encodeURIComponent(caseId));
    if(error){ alert('保存エラー: '+(error.message||JSON.stringify(error))); return; }
    curCase={...curCase,findings:fs};
    const idx=cases.findIndex(c=>c.id===caseId);
    if(idx>=0) cases[idx]=curCase;
  }
  renderMain();
}

/* ====================================================
   FINDING FORM
   ==================================================== */
function openFindingForm(enc,tab){
  ftab=tab;
  if(enc){ fform=decodeF(enc)||{}; }
  else{ fform={id:'',type:'image',label:'',url:'',description:'',bodyPart:bodyPart||'頭部',side:bodySide}; }
  $('fm-label').value=fform.label||'';
  $('fm-desc').value=fform.description||'';
  $('fm-title').textContent=fform.id?'所見を編集':'所見の登録';
  $('fm-save').textContent=fform.id?'更新する':'保存する';
  setFT(fform.type||'image');
  const ua=$('fm-upload');
  ua.textContent=fform.url?'✅ 読込完了（クリックで変更）':'📁 ファイルをアップロード';
  ua.className='upa'+(fform.url?' ok':'');
  $('fm-file').value='';
  show('M-finding');
}

function setFT(t){
  fform.type=t;
  ['image','speech','sound'].forEach(x=>{
    const b=$('ft-'+x); if(!b) return;
    b.style.background=x===t?'var(--s0)':'transparent';
    b.style.color=x===t?'var(--blue)':'var(--t2)';
  });
  $('fm-file').accept=t==='image'?'image/*':'audio/*';
}

async function onFileChange(e){
  const f=e.target.files[0]; if(!f) return;
  const ua=$('fm-upload'); ua.textContent='⏳ 処理中...'; ua.className='upa';
  const reader=new FileReader();
  reader.onload=async(ev)=>{
    let r=ev.target.result;
    if(f.type.startsWith('image/')) r=await compImg(r);
    fform.url=r; ua.textContent='✅ 読込完了'; ua.className='upa ok';
  };
  reader.readAsDataURL(f);
}

function compImg(b64){ return new Promise(res=>{
  const img=new Image(); img.src=b64;
  img.onload=()=>{
    const c=document.createElement('canvas'); let w=img.width,h=img.height;
    const M=800; if(w>h){ if(w>M){ h*=M/w; w=M; } }else{ if(h>M){ w*=M/h; h=M; } }
    c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
    res(c.toDataURL('image/jpeg',.7));
  };
}); }

async function saveFinding(){
  fform.label=$('fm-label').value.trim();
  fform.description=$('fm-desc').value.trim();
  if(!fform.label){ alert('タイトルを入力してください'); return; }
  const fs=pf(curCase);
  if(!fs[ftab]) fs[ftab]=[];
  if(fform.id){
    fs[ftab]=fs[ftab].map(x=>x.id===fform.id?{...fform}:x);
  }else{
    fs[ftab].push({...fform,id:''+Date.now(),side:bodySide});
  }
  await writeFindings(fs);
  closeModal('M-finding');
}

/* ====================================================
   UTILS
   ==================================================== */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ ['M-addcase','M-finding'].forEach(closeModal); } });
